policy_version: "0.1"
allowed_capabilities:
  - "db:read(metrics)"
  - "db:read(logs)"
  - "db:read(incident_rules)"
  - "db:read(incidents)"
  - "db:write(incidents)"
  - "db:write(alerts)"
  - "net:http(status_page)"
  - "net:http(grafana_api)"
  - "net:http(jira_api)"
  - "notify:pagerduty(incident_id)"
  - "notify:email(management)"
  - "notify:slack(incident-channel)"
